{% extends 'hr/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --text-main: #2d3436;
        --border-color: #dee2e6;
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
    }

    /* Fixed/Sticky Header Section */
    .hero-header {
        position: sticky;
        top: 0;
        width: 100%;
        height: 25vh;
        display: flex;
        align-items: flex-end;
        overflow: hidden;
        background: #000;
        z-index: 10;
    }

    .hero-header::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%), 
                    url('https://images.pexels.com/photos/3778622/pexels-photo-3778622.jpeg');
        background-size: cover;
        background-position: center;
        filter: blur(3px); /* Subtly blurred image */
        transform: scale(1.1);
    }

    .hero-header h1 {
        position: relative;
        z-index: 2;
        color: #ffffff;
        font-family: 'Cinzel', serif;
        font-size: 3.5rem;
        text-transform: uppercase;
        margin: 0;
        padding: 0 0 20px 50px;
        letter-spacing: 2px;
        text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
    }

    /* Full Width Form Container */
    .form-container {
        padding: 40px 50px;
        max-width: 100%;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .field-label {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--text-main);
        margin-bottom: 10px;
        display: block;
    }

    /* Standard Full Width Input Style */
    .full-input {
        width: 100%;
        padding: 15px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    .full-input:focus {
        outline: none;
        border-color: #000;
    }

    textarea.full-input {
        min-height: 100px; /* Reduced to fit on one page */
        resize: vertical;
    }

    /* Duration Section - White box styling */
    .duration-box {
        background: #ffffff;
        border: 1px solid var(--border-color);
        padding: 20px;
        display: flex;
        gap: 30px;
        margin-bottom: 30px;
    }

    .duration-item {
        flex: 1;
    }

    .duration-item label {
        font-size: 0.75rem;
        font-weight: 800;
        color: #95a5a6;
        text-transform: uppercase;
        display: block;
        margin-bottom: 8px;
    }

    /* Bottom Row: Checkbox and Submit */
    .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
    }

    .permanent-check {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.9rem;
        cursor: pointer;
    }

    .permanent-check input {
        width: 20px;
        height: 20px;
        accent-color: #000;
    }

    .update-btn {
        background: #000;
        color: #fff;
        border: none;
        padding: 15px 60px;
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .update-btn:hover {
        background: #333;
    }
    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .hero-header {
            height: 18vh; /* Slightly smaller header for mobile */
        }

        .hero-header h1 {
            font-size: 2rem;
            padding: 0 0 15px 20px;
            letter-spacing: 1px;
        }

        .form-container {
            padding: 20px; /* Reduce breathing room on edges */
        }

        .duration-box {
            flex-direction: column; /* Stack Days, Hours, Minutes vertically */
            gap: 15px;
            padding: 15px;
        }

        .duration-item {
            width: 100%;
        }

        .form-footer {
            flex-direction: column; /* Stack checkbox and button */
            gap: 25px;
            align-items: flex-start;
        }

        .update-btn {
            width: 80%; /* Full-width button for easier thumb access */
            padding: 15px 0;
            margin: auto;
        }
        
        .permanent-check {
            font-size: 0.85rem;
        }
    }

    /* Extra small screens */
    @media (max-width: 480px) {
        .hero-header h1 {
            font-size: 1.5rem;
        }
        
        .full-input {
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
        }
    }
</style>

<div class="hero-header">
    <h1>Edit Announcement</h1>
</div>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="field-label">Announcement Title</label>
            <input type="text" name="title" class="full-input" value="{{ announcement.title }}" required>
        </div>

        <div class="form-group">
            <label class="field-label">Announcement Details</label>
            <textarea name="content" class="full-input" required>{{ announcement.content }}</textarea>
        </div>

        <div class="duration-box" id="durationBox">
            <div class="duration-item">
                <label>Days</label>
                <select name="days" class="full-input">
                    {% for i in "0123456789"|make_list %}
                    <option value="{{ forloop.counter0 }}" {% if selected_days == forloop.counter0 %}selected{% endif %}>
                        {{ forloop.counter0 }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="duration-item">
                <label>Hours</label>
                <select name="hours" class="full-input">
                    {% for i in "012345678901234567890123"|make_list %}
                    <option value="{{ forloop.counter0 }}" {% if selected_hours == forloop.counter0 %}selected{% endif %}>
                        {{ forloop.counter0 }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="duration-item">
                <label>Minutes</label>
                <select name="minutes" class="full-input">
                    {% for i in "012345678901234567890123456789012345678901234567890123456789"|make_list %}
                    <option value="{{ forloop.counter0 }}" {% if selected_minutes == forloop.counter0 %}selected{% endif %}>
                        {{ forloop.counter0 }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-footer">
            <label class="permanent-check">
                <input type="checkbox" name="permanent" id="permToggle" {% if announcement.permanent %}checked{% endif %}>
                Set as Permanent
            </label>

            <button type="submit" class="update-btn">Update Now</button>
        </div>
    </form>
</div>

<script>
    const permToggle = document.getElementById('permToggle');
    const durationBox = document.getElementById('durationBox');
    const selects = durationBox.querySelectorAll('select');

    // Logic to disable duration if permanent is checked
    function toggleDuration() {
        durationBox.style.opacity = permToggle.checked ? '0.3' : '1';
        selects.forEach(s => s.disabled = permToggle.checked);
    }

    permToggle.addEventListener('change', toggleDuration);
    window.onload = toggleDuration; // Check status on page load
</script>

{% endblock %}
