{% extends 'hr/base.html' %}
{% block content %}

<style>
    /* Premium Typography & Variables */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

    :root {
        --text-main: #1a1a1a;
        --text-sub: #636e72;
        --accent-teal: #007079;
        --danger-red: #d63031;
        --bg-body: #f8f9fa;
        --glass-white: rgba(255, 255, 255, 0.85);
        --border-soft: rgba(0, 0, 0, 0.05);
    }

    body {
        background-color: var(--bg-body);
        font-family: 'Inter', sans-serif;
        margin: 0;
        min-height: 100vh; 
    }

    /* --- Hero Header Section --- */
    .hero-header {
        width: 100%;
        height: 30vh; /* Slightly taller for more visual impact */
        background: linear-gradient(to top, var(--bg-body) 0%, rgba(0, 0, 0, 0.4) 100%),
                    linear-gradient(to right, rgba(0, 0, 0, 0.7) 0%, transparent 100%),
                    url('https://images.pexels.com/photos/1170412/pexels-photo-1170412.jpeg');
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        padding-left: 10%;
    }

    .hero-content h1 {
        font-family: 'Playfair Display', serif;
        color: white;
        font-size: 3rem;
        margin: 0;
        letter-spacing: -1px;
        opacity: 0.9;
    }
    .content-wrapper {
        display: flex;
        justify-content: center;
        margin-top: -120px; 
        padding-bottom: 40px;
    }

    .status-container {
        max-width: 550px;
        width: 90%;
        background: var(--glass-white);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 60px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
        text-align: center;
        animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes reveal {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .status-icon-wrap {
        margin-bottom: 30px;
        position: relative;
        display: inline-block;
    }

    .status-icon {
        width: 60px;
        height: 60px;
        line-height: 58px;
        /* border: 1px solid var(--accent-teal); */
        border-radius: 50%;
        margin: 0 auto;
        color: var(--accent-teal);
        font-size: 1.2rem;
        transition: all 0.5s ease;
    }

    .status-container:hover .status-icon {
        background: var(--accent-teal);
        color: white;
        transform: rotate(360deg);
    }

    .status-container h2 {
        font-family: 'Playfair Display', serif;
        font-size: 2.2rem;
        color: var(--text-main);
        margin-bottom: 20px;
        font-weight: 600;
        letter-spacing: -0.03em;
    }

    .status-subtext {
        font-size: 0.95rem;
        font-weight: 300;
        color: var(--text-sub);
        margin-bottom: 45px;
        line-height: 2;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
    }

    .action-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    .btn-clear-action {
        width: 100%;
        box-sizing: border-box;
        background-color: #1a1a1a; 
        color: white;
        padding: 20px 30px;
        border-radius: 0; 
        font-size: 0.75rem;
        font-weight: 600;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 3px;
        transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        position: relative;
        overflow: hidden;
    }

    .btn-clear-action:hover {
        background-color: var(--danger-red);
        letter-spacing: 5px;
        box-shadow: 0 10px 30px rgba(214, 48, 49, 0.3);
    }



    /* --- Responsive --- */
    @media (max-width: 600px) {
        .hero-header { height: 25vh; }
        .hero-content h1 { font-size: 2rem; }
        .content-wrapper{margin-top: -80px;}
        .status-container { padding: 25px 25px; margin-top: 10px; }
        .status-container h2 { font-size: 1.6rem; margin-top: -30px; }
    }
</style>

<header class="hero-header">
    <div class="hero-content">
    </div>
</header>

<div class="content-wrapper">
    <div class="status-container">
        <div class="status-icon-wrap">
            <div class="status-icon">✓</div>
        </div>

        <h2>{{ message }}</h2>
        
        <p class="status-subtext">
            Records have been successfully committed to the database. The administrative ledger is now current and synchronized.
        </p>

        <div class="action-area">
            {% if show_clear %}
                <a href="{% url 'clear_attendance' %}" class="btn-clear-action">Clear Attendance</a>
            {% endif %}
            
        </div>
    </div>
</div>

{% endblock %}
