{% extends 'hr/base.html' %}
{% block content %}
<style>
    /* --- Premium Minimalist Theme --- */
    :root {
        --accent-teal: #008080;
        --dark-charcoal: #1a1a1a;
        --soft-gray: #f9f9f9;
        --border-color: #e0e0e0;
        --text-main: #333;
    }

    /* Lock the wrapper to exactly the viewable area */
    .employee-page-wrapper {
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: #fff;
        font-family: 'Inter', sans-serif;
        animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap');

    .hero-header {
        width: 100%;
        height: 25vh;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.8) 0%, rgba(31, 31, 31, 0.4) 50%, transparent 90%),
            url('https://images.pexels.com/photos/1170412/pexels-photo-1170412.jpeg');
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        overflow: hidden;
    }

    .hero-header h1 {
        color: #e7dbdb;
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: 3rem;
        letter-spacing: -1.5px;
        text-transform: uppercase;
        margin: 0;
        padding: 0px 0 20px 40px;
        line-height: 1;
    }

    /* --- Form Layout & Padding Fix --- */
    .form-content-area {
        max-width: 1100px;
        width: 95%;
        margin: 50px auto 0;
        background: white;
        padding: 5px 10px;
        /* Reduced padding */
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 35px;
        z-index: 10;
        max-height: 70vh;
    }

    .photo-section {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
    }

    .profile-placeholder {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: #fdfdfd;
        border: 1px solid rgb(172, 163, 163);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .profile-placeholder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* --- Side-by-Side Buttons --- */
    .upload-action-bar {
        display: flex;
        width: 100%;
        gap: 10px;
        align-items: stretch;
        margin-top: 5px;
    }

    .upload-trigger {
        flex: 1;
        background: var(--dark-charcoal);
        color: white;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .delete-trigger {
        width: 45px;
        background: #fff;
        color: #ff4d4d;
        border: 1px solid #fee2e2;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .delete-trigger:hover {
        background: #fff5f5;
        border-color: #ff4d4d;
    }

    /* --- Form Input Spacing & Labels --- */
    .input-content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 40px;
        row-gap: 20px;
        /* Slight space between inputs */
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 11px;
        /* Increased size */
        font-weight: 700;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
        /* Added spacing */
    }

    .form-group input,
    .form-group select {
        padding: 6px 0;
        border: none;
        border-bottom: 2px solid var(--border-color);
        background: transparent;
        font-size: 14px;
        color: var(--text-main);
        transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-bottom-color: var(--accent-teal);
    }

    .full-width {
        grid-column: span 2;
    }

    .save-btn {
        margin-top: 10px;
        background: var(--dark-charcoal);
        color: white;
        padding: 14px;
        border: none;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
    }

    .save-btn:hover {
        background: var(--accent-teal);
        letter-spacing: 4px;
    }

    .alert-box {
        padding: 10px 15px;
        margin-bottom: 5px;
        border-radius: 6px;
        font-size: 12px;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .alert-success {
        background: #f0fdf4;
        color: #166534;
        border-left: 4px solid #22c55e;
    }

    .alert-error {
        background: #fef2f2;
        color: #991b1b;
        border-left: 4px solid #ef4444;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* --- Optimized Mobile Responsiveness --- */
    @media (max-width: 768px) {

        /* 1. Unlock height so the form can scroll naturally */
        .employee-page-wrapper {
            height: auto;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* 2. Shrink hero header to save vertical space */
        .hero-header {
            height: 18vh;
        }

        .hero-header h1 {
            font-size: 1.8rem;
            padding-left: 20px;
            padding-bottom: 15px;
        }

        /* 3. Stack the Photo Section and Form Section */
        .form-content-area {
            grid-template-columns: 1fr;
            /* Changes from 2-col to 1-col */
            margin: 20px auto;
            gap: 25px;
            max-height: none;
            padding: 20px;
            width: 90%;
        }

        /* 4. Center and size the photo preview appropriately */
        .photo-section {
            width: 100%;
            max-width: 200px;
            /* Prevents the photo from being massive */
            margin: 0 auto;
        }

        /* 5. Ensure inputs stack and use full width */
        .input-content-grid {
            grid-template-columns: 1fr;
            row-gap: 18px;
        }

        /* 6. Fix for elements that were forced to span 2 columns */
        .full-width {
            grid-column: span 1;
        }

        /* 7. Improve input usability on touch screens */
        .form-group input,
        .form-group select {
            font-size: 16px;
            /* Prevents iOS auto-zoom on focus */
            padding: 10px 0;
        }

        .save-btn {
            margin-top: 20px;
            padding: 16px;
        }
    }
</style>

<div class="employee-page-wrapper">
    <div class="hero-header">
        <h1>ADD EMPLOYEE</h1>
    </div>
    
    {% if messages %}
        {% for message in messages %}
            {% if 'add_employee' in message.extra_tags %}
                <div class="alert-box {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                    <span>{{ message }}</span>
                </div>
            {% endif %}
        {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="form-content-area">
        {% csrf_token %}

        <div class="photo-section">
            <div class="profile-placeholder" id="imagePreview">
                <i data-lucide="user" style="width: 40px; height: 40px; color: #d1d1d1; stroke-width: 1.5;"></i>
            </div>

            <div class="upload-action-bar">
                <input type="file" id="photo-input" name="photo" accept="image/*" style="display:none;"
                    onchange="previewImage(this)">

                <label for="photo-input" class="upload-trigger" title="Upload Photo">
                    <i data-lucide="upload" style="width: 16px; height: 16px;"></i>
                    <span>Upload</span>
                </label>

                <button type="button" class="delete-trigger" onclick="removeImage()" title="Remove Photo">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
        </div>

        <div class="input-content-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ form_data.name }}" placeholder="Ex: Aali" required>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" name="place" value="{{ form_data.place }}" placeholder="City, Country" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ form_data.email }}" placeholder="name@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" value="{{ form_data.phone }}" placeholder="10-digit number"
                    maxlength="10" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" value="{{ form_data.dob }}" required>
            </div>

            <div class="form-group">
                <label>Joining Date</label>
                <input type="date" name="joining" value="{{ form_data.joining }}" required>
            </div>

            <div class="form-group">
                <label>Designation</label>
                <select name="job_role" required>
                    <option value="" disabled {% if not form_data.job_role %}selected{% endif %}>Select Role</option>
                    {% for role in roles %}
                        <option value="{{ role.id }}" {% if form_data.job_role|stringformat:"s" == role.id|stringformat:"s" %}selected{% endif %}>
                            {{ role.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Employment Type</label>
                <select name="mode" required>
                    <option value="" disabled {% if not form_data.mode %}selected{% endif %}>Select Mode</option>
                    <option value="Intern" {% if form_data.mode == "Intern" %}selected{% endif %}>Internship</option>
                    <option value="Part Time" {% if form_data.mode == "Part Time" %}selected{% endif %}>Part-Time</option>
                    <option value="Full Time" {% if form_data.mode == "Full Time" %}selected{% endif %}>Full-Time</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Annual Salary</label>
                <input type="number" name="salary" value="{{ form_data.salary }}" placeholder="0.00" required>
            </div>

            <div class="full-width">
                <button type="submit" class="save-btn">Add Employee</button>
            </div>
        </div>
    </form>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function removeImage() {
        const preview = document.getElementById('imagePreview');
        const input = document.getElementById('photo-input');
        input.value = "";
        preview.innerHTML = `<i data-lucide="user" style="width: 40px; height: 40px; color: #d1d1d1; stroke-width: 1.5;"></i>`;
        if (window.lucide) lucide.createIcons();
    }
</script>
{% endblock %}
