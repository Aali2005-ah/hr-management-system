<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>danexatech · contact Chennai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            overflow: hidden;
        }

        .master {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        nav {
            position: absolute;
            top: 50px;
            left: 950px;
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: #2f4156;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: 0.3s;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #2f4156;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }


        .content-row {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .left-image {
            flex: 1.1;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
        }

        .left-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            filter: grayscale(0.2) contrast(1.1);
        }

        .left-image .stamp {
            position: absolute;
            bottom: 30px;
            right: 25px;
            background: rgba(0, 128, 128, 0.9);
            backdrop-filter: blur(4px);
            color: #ffffff;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
        }

        .right-panel {
            flex: 1;
            background: #ffffff;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .greeting h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1a1a1a;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .greeting h2 span {
            color: #008080;
            font-style: italic;
        }

        .divider-short {
            width: 45px;
            height: 2px;
            background: #008080;
            margin: 12px 0 25px;
        }

        .contact-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #fdfdfd;
            padding: 15px 20px;
            border-radius: 10px;
            transition: all 0.4s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid #f0f0f0;
            border-left: 3px solid #1a1a1a;
        }

        /* Unique Floating Bracket Icon Container */
        .icon-wrapper {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #008080;
            font-size: 1.1rem;
            transition: 0.4s;
        }

        .icon-wrapper::before,
        .icon-wrapper::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 60%;
            background: #008080;
            opacity: 0.3;
            transition: 0.4s ease;
        }

        .icon-wrapper::before {
            left: 0;
        }

        .icon-wrapper::after {
            right: 0;
        }

        /* Hover Effects */
        .contact-item:hover {
            background: #ffffff;
            border-color: #008080;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.03);
            transform: translateY(-2px);
        }

        .contact-item:hover .icon-wrapper {
            color: #1a1a1a;
        }

        .contact-item:hover .icon-wrapper::before,
        .contact-item:hover .icon-wrapper::after {
            height: 100%;
            opacity: 1;
            background: #008080;
        }

        .contact-info .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #008080;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .contact-info .value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .social-headline {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .social-simple-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-block {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1a1a1a;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s ease;
            padding: 5px 0;
        }

        .social-block:hover {
            color: #008080;
            padding-left: 5px;
        }

        .social-block i {
            color: #008080;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .footer-note {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-style: italic;
            color: #008080;
            font-family: 'Cormorant Garamond', serif;
        }

        .footer-note .line {
            width: 30px;
            height: 1px;
            background: #008080;
            opacity: 0.5;
        }

        /* ================= MOBILE RESPONSIVE ================= */

        @media (max-width: 1100px) {

            body,
            html {
                overflow-y: auto;
                overflow-x: hidden;
                height: auto;
            }

            .master {
                height: auto;
                min-height: 100vh;
            }

            /* NAVIGATION: Fixed 1-line layout */
            nav {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                padding: 40px 10px 10px 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                /* Tight gap to fit everything */
                background: #ffffff;
                color: transparent;
                /* Hides the "|" separators */
                flex-wrap: nowrap;
                /* Forces single line */
            }

            nav a {
                font-size: 9px;
                /* Smaller font for perfect fit */
                letter-spacing: 1px;
                white-space: nowrap;
                /* Prevents text breaking */
                color: #2f4156;
            }

            /* Content Layout */
            .content-row {
                flex-direction: column;
                height: auto;
            }

            .left-image {
                margin-top: 70px;
                height: 30vh;
                flex: none;
            }

            .right-panel {
                padding: 40px 20px;
                flex: none;
                text-align: center;
                align-items: center;
            }

            /* Adjusting elements for center alignment on mobile */
            .greeting h2 {
                font-size: 2.2rem;
            }

            .divider-short {
                margin: 12px auto 25px;
            }

            .contact-cards {
                width: 100%;
                max-width: 400px;
            }

            .contact-item {
                text-align: left;
            }

            .social-simple-grid {
                width: 100%;
                grid-template-columns: 1fr 1fr;
                justify-items: center;
            }

            .footer-note {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="master">
        <nav>
            <a href="{% url 'index' %}">Home</a> |
            <a href="{% url 'about' %}">About</a> |
            <a href="{% url 'contact' %}">Contact</a> |
            <a href="{% url 'employee_login' %}">Announcement</a>
        </nav>
        <div class="content-row">
            <div class="left-image">
                <img src="https://images.pexels.com/photos/4467860/pexels-photo-4467860.jpeg" alt="heritage workspace">
                <div class="stamp"><i class="fa-regular fa-clock"></i> Established 1923</div>
            </div>
            <div class="right-panel">
                <div class="greeting">
                    <h2>Let's <span>connect</span></h2>
                    <div class="divider-short"></div>
                </div>

                <div class="contact-cards">
                    <a href="mailto:danexatech@gmail.com" class="contact-item">
                        <div class="icon-wrapper"><i class="fa-regular fa-envelope"></i></div>
                        <div class="contact-info">
                            <div class="label">Primary Email</div>
                            <div class="value">danexatech@gmail.com</div>
                        </div>
                    </a>
                    <a href="tel:+919874632132" class="contact-item">
                        <div class="icon-wrapper"><i class="fa-solid fa-mobile-screen-button"></i></div>
                        <div class="contact-info">
                            <div class="label">Inquiries</div>
                            <div class="value">+91 98746 32132</div>
                        </div>
                    </a>
                    <a href="https://www.google.com/maps/search/?api=1&query=Chennai,+Tamilnadu" target="_blank"
                        class="contact-item">
                        <div class="icon-wrapper"><i class="fa-regular fa-building"></i></div>
                        <div class="contact-info">
                            <div class="label">location</div>
                            <div class="value">Chennai, Tamilnadu</div>
                        </div>
                    </a>
                </div>

                <div class="social-headline">Social Presence</div>
                <div class="social-simple-grid">
                    <a href="#" class="social-block"><i class="fa-brands fa-instagram"></i> danexa_26</a>
                    <a href="#" class="social-block"><i class="fa-brands fa-linkedin-in"></i>DaNexa </a>
                    <a href="#" class="social-block"><i class="fa-brands fa-twitter"></i> Da-nexa</a>
                    <a href="#" class="social-block"><i class="fa-brands fa-facebook-f"></i> danexa</a>
                </div>

                <div class="footer-note">
                    <span class="line"></span>
                    <span>response within 24 hours</span>
                    <span class="line"></span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
